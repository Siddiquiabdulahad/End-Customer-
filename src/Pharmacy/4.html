<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Details Popup</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar hide */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <!-- Button to open popup (for demo) -->
    <div class="text-center">
        <button id="openPopupBtn" class="bg-teal-600 text-white px-6 py-2 rounded-lg shadow-md hover:bg-teal-700 transition">
            Open Prescription Details
        </button>
    </div>

    <!-- Popup Modal (hidden by default) -->
    <div id="prescriptionPopup" class="fixed inset-0 flex justify-center items-center bg-black/50 z-50 hidden">
        <div class="bg-white w-[49.375rem] max-h-[90vh] rounded-[15px] p-4 overflow-y-auto no-scrollbar shadow-xl">
            <div class="flex flex-col">
                <!-- Header -->
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <svg class="w-6 h-6 text-gray-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                            <polyline points="10 9 9 9 8 9" />
                        </svg>
                        <span class="text-gray-800 font-normal text-xl">Record Details</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="border border-teal-700 rounded-lg p-2 cursor-pointer hover:bg-gray-100 transition" id="closePopupBtn">
                            <i data-lucide="x" class="w-5 h-5 text-gray-600"></i>
                        </div>
                    </div>
                </div>

                <!-- Subtitle -->
                <p class="font-normal text-sm text-gray-600 pt-2">Review the extracted data below. You can edit and manage it before sharing.</p>

                <!-- Image placeholder (as per screenshot) -->
                <div class="mt-4 p-2 border border-dashed rounded-[20px] bg-gray-50">
                    <div class="flex items-center justify-center gap-2">
                        <img src="https://placehold.co/80x60?text=123img.jpeg" alt="prescription" class="max-h-16 object-contain">
                        <span class="text-xs text-gray-500">123img.jpeg</span>
                    </div>
                </div>

                <!-- Form fields grid (matching the image) -->
                <div class="mt-4 grid grid-cols-2 gap-4">
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Patient Name</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="Monica Singh" readonly>
                            <i data-lucide="user" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Doctor Name</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="Dr. Aisha Rahman" readonly>
                            <i data-lucide="stethoscope" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Gender</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="Female" readonly>
                            <i data-lucide="heart" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Age</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="25" readonly>
                            <i data-lucide="star" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Phone No</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="+91 973*******" readonly>
                            <i data-lucide="phone" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Diagnosis Type</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="Respiratory Infection" readonly>
                            <i data-lucide="clipboard-list" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Specialty</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="Pulmonologist" readonly>
                            <i data-lucide="briefcase" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Prescription Date</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="21/05/25" readonly>
                            <i data-lucide="calendar" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Reg. No</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="XY1234" readonly>
                            <i data-lucide="hash" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div>
                        <label class="font-semibold text-sm text-gray-700">Medicine Information</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="Crocin 500mg Tablet" readonly>
                            <i data-lucide="pill" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                    <div class="col-span-2">
                        <label class="font-semibold text-sm text-gray-700">Brand / Manufacturer</label>
                        <div class="relative pt-2">
                            <input type="text" class="border border-gray-300 w-full rounded-full pl-8 py-2 text-sm" value="Cipla" readonly>
                            <i data-lucide="building-2" class="w-4 h-4 absolute top-1/2 left-2 -translate-y-1/2 text-gray-400"></i>
                        </div>
                    </div>
                </div>

                <!-- Badges -->
                <div class="flex items-center gap-4 pt-4">
                    <div class="flex items-center gap-2">
                        <i data-lucide="alert-triangle" class="w-3.5 h-3.5 text-red-600"></i>
                        <span class="text-red-600 font-bold text-xs">Prescription Required</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i data-lucide="alert-triangle" class="w-3.5 h-3.5 text-blue-600"></i>
                        <span class="text-blue-600 font-bold text-xs">NPPA Regulated</span>
                    </div>
                </div>

                <!-- Dosage, Method, Duration, Instruction -->
                <div class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div>
                        <span class="font-semibold text-sm text-teal-700">Dosage</span>
                        <input type="text" class="border border-teal-600 rounded-full px-4 py-2 text-teal-700 w-full mt-1 text-sm" value="500mg" readonly>
                    </div>
                    <div>
                        <span class="font-semibold text-sm text-teal-700">Method</span>
                        <input type="text" class="border border-teal-600 rounded-full px-4 py-2 text-teal-700 w-full mt-1 text-sm" value="Oral" readonly>
                    </div>
                    <div>
                        <span class="font-semibold text-sm text-teal-700">Duration</span>
                        <input type="text" class="border border-teal-600 rounded-full px-4 py-2 text-teal-700 w-full mt-1 text-sm" value="5 Days/week" readonly>
                    </div>
                    <div>
                        <span class="font-semibold text-sm text-teal-700">Instruction</span>
                        <input type="text" class="border border-teal-600 rounded-full px-4 py-2 text-teal-700 w-full mt-1 text-sm" value="After meal" readonly>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="mt-6 flex items-center justify-center gap-4">
                    <button id="cancelPopupBtn" class="border border-gray-300 rounded-lg w-32 h-10 font-semibold text-sm text-teal-700 hover:bg-gray-100 transition">Cancel</button>
                    <button class="bg-teal-700 hover:bg-teal-800 rounded-lg w-32 h-10 font-semibold text-sm text-white transition">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const popup = document.getElementById('prescriptionPopup');
        const openBtn = document.getElementById('openPopupBtn');
        const closeBtn = document.getElementById('closePopupBtn');
        const cancelBtn = document.getElementById('cancelPopupBtn');

        function openPopup() {
            popup.classList.remove('hidden');
        }

        function closePopup() {
            popup.classList.add('hidden');
        }

        openBtn.addEventListener('click', openPopup);
        closeBtn.addEventListener('click', closePopup);
        cancelBtn.addEventListener('click', closePopup);

        // Close when clicking outside the popup content
        popup.addEventListener('click', function(e) {
            if (e.target === popup) closePopup();
        });
    </script>
</body>
</html>
